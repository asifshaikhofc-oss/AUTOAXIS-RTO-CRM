<!DOCTYPE html>
<html>
<head>
    <title>Add New Entry - AUTOAXIS</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #f4f6f9; color: #333; font-size: 13px; }
        .sidebar { width: 240px; height: 100vh; background: #1e1212; position: fixed; color: #ecf0f1; border-right: 3px solid #8B0000; }
        .sidebar-brand { padding: 25px 20px; text-align: center; background: #140b0b; }
        .sidebar-brand h2 { margin: 0; font-size: 18px; color: #fff; text-transform: uppercase; }
        .sidebar-brand span { font-size: 10px; color: #ff9800; font-weight: bold; }
        .main { margin-left: 240px; padding: 30px; display: flex; justify-content: center; }
        .form-box { background: #fff; padding: 35px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.06); width: 100%; max-width: 850px; border-top: 4px solid #8B0000; }
        .form-box h2 { margin-top: 0; font-size: 20px; color: #2c3e50; margin-bottom: 25px; padding-bottom: 10px; border-bottom: 1px solid #f2f4f8; }
        
        .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .full-width { grid-column: span 2; }
        .finance-section { grid-column: span 2; background: #f8fafc; padding: 20px; border-radius: 8px; border: 1px dashed #cbd5e1; margin-top: 10px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        
        label { font-size: 13px; font-weight: 600; color: #4a5568; display: block; margin-bottom: 8px; text-transform: uppercase; }
        input[type=text], textarea, select, input[type=number] { width: 100%; padding: 12px 15px; box-sizing: border-box; border: 1px solid #dcdde1; border-radius: 6px; font-size: 14px; text-transform: uppercase; }
        input:focus, select:focus, textarea:focus, input[type=number]:focus { outline: none; border-color: #8B0000; box-shadow: 0 0 0 3px rgba(139,0,0,0.1); }
        
        .btn-group { margin-top: 25px; display: flex; gap: 15px; justify-content: flex-end; }
        button { background: #8B0000; color: white; border: none; padding: 12px 30px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 14px; }
        button:hover { background: #a50000; }
        .cancel-btn { background: #718096; text-decoration: none; color: white; padding: 12px 30px; border-radius: 6px; font-weight: 600; font-size: 14px; text-align: center; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-brand">
        <h2>Autoaxis</h2>
        <span>Solution & Services LLP</span>
    </div>
    <a href="/dashboard" style="display: block; color: #bdc3c7; text-decoration: none; padding: 15px 20px; font-size: 14px; font-weight: 500; margin-top: 10px; text-align: center; border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; background: rgba(255,255,255,0.02); margin-left:15px; margin-right:15px;">⬅️ Dashboard</a>
</div>

<div class="main">
    <div class="form-box">
        <h2>📄 Register New RTO File Entry</h2>
        <form id="rtoForm" method="POST" action="/add">
            <div class="form-grid">
                <div><label>Vehicle Number *</label><input type="text" name="vehicle_no" placeholder="e.g. MH12XX1234" required style="font-weight: bold;"></div>
                <div><label>Vehicle Model / Variant *</label><input type="text" name="vehicle_model" placeholder="e.g. ACTIVA 6G" required></div>
                
                <div><label>Old Owner Name *</label><input type="text" name="owner_name" placeholder="Enter old owner name" required></div>
                <div><label>New Owner Name</label><input type="text" name="new_owner_name" placeholder="Enter new owner name"></div>
                
                <div><label>Old Owner Mobile</label><input type="text" name="old_mobile" placeholder="Enter contact number"></div>
                <div><label>Customer Mobile *</label><input type="text" name="new_mobile" placeholder="Enter WhatsApp number" required></div>
                
                <div><label>Chassis Number *</label><input type="text" name="chassis_no" placeholder="Enter full chassis number" required></div>
                <div><label>Engine Number *</label><input type="text" name="engine_no" placeholder="Enter engine number" required></div>
                
                <div><label>RTO Location</label><input type="text" name="rto" placeholder="e.g. PUNE, PCMC"></div>
                <div><label>Work Type</label>
                    <select name="work_type">
                        <option value="TO">TO (Transfer of Ownership)</option>
                        <option value="HPT">HPT (Hypothecation Termination)</option>
                        <option value="TO HPA">TO HPA (Transfer + Hypothecation Add)</option>
                        <option value="NOC">NOC (No Objection Certificate)</option>
                        <option value="DRC">DRC (Duplicate RC)</option>
                        <option value="FITNESS">FITNESS</option>
                    </select>
                </div>
                
                <div><label>Dealer / Agent Name *</label><input type="text" name="dealer" placeholder="Enter dealer name" required></div>
                <div><label>Dealer Mobile *</label><input type="text" name="dealer_mobile" placeholder="Enter Dealer's WhatsApp Number" required></div>

                <div class="finance-section">
                    <div style="grid-column: span 3; margin: 0;"><h3 style="margin:0; font-size:13px; color:#1e293b;">💵 Expense Desk Log (Raseed Ke Hisab Se Bharein)</h3></div>
                    <div><label>Challan Paid (₹)</label><input type="number" step="0.01" name="challan_amt" placeholder="0.00"></div>
                    <div><label>PUC Charges (₹)</label><input type="number" step="0.01" name="puc_amt" placeholder="0.00"></div>
                    <div><label>Insurance Premium (₹)</label><input type="number" step="0.01" name="insurance_amt" placeholder="0.00"></div>
                </div>
                
                <input type="hidden" name="late_noc_amt" value="0">
                <input type="hidden" name="total_billing" value="0">
                <input type="hidden" name="received_amt" value="0">
                <input type="hidden" name="status" value="PENDING">
            </div>
            
            <div class="btn-group">
                <a href="/dashboard" class="cancel-btn">Cancel</a>
                <button type="submit">💾 Save & Register Case</button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
