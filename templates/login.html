<!DOCTYPE html>
<html>
<head>
    <title>Login - AUTOAXIS CRM</title>
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f8fafc; margin: 0; display: flex; height: 100vh; align-items: center; justify-content: center; }
        .login-box { background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 400px; border-top: 5px solid #8B0000; text-align: center; }
        .login-box h2 { margin: 0 0 5px 0; color: #1e293b; font-size: 22px; font-weight: 800; text-transform: uppercase; letter-spacing: 1s; }
        .login-box span { font-size: 11px; color: #ff9800; font-weight: bold; display: block; margin-bottom: 25px; text-transform: uppercase; }
        label { display: block; text-align: left; font-size: 13px; font-weight: 600; color: #475569; margin-bottom: 8px; }
        input { width: 100%; padding: 12px 15px; box-sizing: border-box; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; margin-bottom: 20px; transition: all 0.2s; }
        input:focus { outline: none; border-color: #8B0000; box-shadow: 0 0 0 3px rgba(139,0,0,0.1); }
        button { width: 100%; background: #8B0000; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-weight: 700; font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px; transition: background 0.2s; }
        button:hover { background: #a50000; }
        .flash-msg { background: #fee2e2; color: #dc2626; padding: 10px; border-radius: 6px; font-size: 13px; font-weight: 600; margin-bottom: 15px; border: 1px solid #fca5a5; }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Autoaxis</h2>
    <span>Solution & Services LLP</span>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <div class="flash-msg">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="/login">
        <label>Username</label>
        <input type="text" name="username" placeholder="e.g. admin or staff" required autocomplete="off">

        <label>Password</label>
        <input type="password" name="password" placeholder="••••••••" required>

        <button type="submit">🔐 Secure Login</button>
    </form>
</div>

</body>
</html>
